<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pluma Cósmica</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      color: #222;
    }

    header, main, footer {
      padding: 24px;
      text-align: center;
    }

    header {
      background: #222;
      color: white;
    }

    main {
      min-height: 60vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    h1 {
      margin-bottom: 12px;
      font-size: 2.5rem;
    }

    p {
      font-size: 1.2rem;
      max-width: 600px;
    }

    footer {
      background: #ddd;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Pluma Cósmica</h1>
  </header>

  <main>
    <section>
      <p>Ontem um abacaxi decidiu estudar filosofia com um ventilador aposentado.</p>
    </section>
  </main>

  <footer>
    <p>bungas.</p>
  </footer>
</body>
</html>
